# Conductor 主控 Agent 配置模板
# 复制为 config.yaml 并修改

name: conductor
display_name: "🎵 Conductor"

sub_agents:
  - name: creator
    display_name: "✨ Creator"
    description: "视频生成、3D建模、网页搜索"
    capabilities:
      - video_generation
      - model_generation
      - web_search
    enabled: true

communication:
  timeout: 60
  retry_count: 3

memory:
  short_term_window: 30
  long_term_enabled: true

logging:
  level: INFO
  output_dir: logs/conductor