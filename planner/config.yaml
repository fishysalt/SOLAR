# Creator Agent 配置

name: creator
display_name: "✨ Creator"
description: "视频生成、3D建模、搜索引擎"

# 能力列表
capabilities:
  - name: video_generation
    description: "根据描述生成视频"
    input: "文本描述"
    output: "视频文件"
    
  - name: model_generation
    description: "根据描述生成 3D 模型"
    input: "文本描述 + 可选参考图"
    output: "GLB 文件"
    
  - name: web_search
    description: "搜索互联网信息"
    input: "关键词"
    output: "搜索结果"

# 模型配置
model:
  provider: deepseek
  name: deepseek-v4-flash
  temperature: 0.7

# 通信配置
communication:
  timeout: 60

# 记忆配置
memory:
  short_term_window: 30
  long_term_enabled: true